server {
    listen 80;
    server_name _;

    root /var/www/onetwothree/build;
    index index.html;

    # Serve pre-rendered pages if they exist (e.g. /lake/tahoe/ -> /lake/tahoe/index.html)
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # Cache fingerprinted assets hard (CRA outputs hashed filenames)
    location /static/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}